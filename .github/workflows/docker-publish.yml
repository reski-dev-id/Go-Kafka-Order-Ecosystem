name: Docker Publish

on:
  push:
    branches:
      - master

jobs:
  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push service-order
        uses: docker/build-push-action@v6
        with:
          context: ./service-order
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/service-order:latest

      - name: Build and Push relay-worker
        uses: docker/build-push-action@v6
        with:
          context: ./relay-worker
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/relay-worker:latest

      - name: Build and Push payment-service
        uses: docker/build-push-action@v6
        with:
          context: ./payment-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/payment-service:latest

      - name: Build and Push notification-service
        uses: docker/build-push-action@v6
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/notification-service:latest