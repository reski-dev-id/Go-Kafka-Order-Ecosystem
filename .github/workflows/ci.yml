name: Monorepo CI

on:
  pull_request:
    branches:
      - master

jobs:
  service-order:
    name: Service Order (Go)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: service-order

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: service-order/go.mod

      - name: Download Dependencies
        run: go mod download

      - name: Check Formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

      - name: Build
        run: go build -o app ./cmd/api


  relay-worker:
    name: Relay Worker (Go)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: relay-worker

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: relay-worker/go.mod

      - name: Download Dependencies
        run: go mod download

      - name: Check Formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v

      - name: Build
        run: go build -o worker ./cmd/worker


  payment-service:
    name: Payment Service (Spring Boot)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: payment-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Grant Execute Permission
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean package -DskipTests


  notification-service:
    name: Notification Service (FastAPI)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: notification-service

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Syntax
        run: |
          python -m compileall app


  docker-compose-validation:
    name: Docker Compose Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config